version: v1.3.1

dsn: sqlite:///var/lib/sqlite/db.sqlite?_fk=true&mode=rwc

serve:
  public:
    base_url: https://kratos.example.com/
    cors:
      enabled: false
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: https://auth.example.com/

  # Permit return_to from any HTTPS app on this domain (wildcard does not match apex).
  allowed_return_urls:
    - https://example.com/
    - https://*.example.com/

  flows:
    registration:
      enabled: true
      ui_url: https://auth.example.com/registration

    login:
      ui_url: https://auth.example.com/login

    recovery:
      enabled: true
      ui_url: https://auth.example.com/recovery

    settings:
      ui_url: https://auth.example.com/settings

    logout:
      after:
        default_browser_return_url: https://auth.example.com/

    verification:
      enabled: true
      ui_url: https://auth.example.com/verification
      use: code

  methods:
    password:
      enabled: true

session:
  cookie:
    domain: .example.com
    same_site: Lax

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  delivery_strategy: http
  http:
    request_config:
      url: http://monolith:3000/email/kratos-courier
      method: POST
      body: file:///etc/config/kratos/courier-body.jsonnet
      headers:
        Content-Type: application/json

log:
  level: warning
  format: text
