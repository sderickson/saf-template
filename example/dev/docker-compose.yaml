# common elements between dev and test
services:
  caddy:
    depends_on:
      - clients
    build:
      context: ../..
      dockerfile: ./example/dev/Dockerfile
    ports:
      - 80:80
    volumes:
      - ./caddy-config:/etc/caddy/
      - caddy_data:/data
      - caddy_config:/config

  clients:
    image: your-org-example-clients:latest
    build:
      context: ../..
      dockerfile: ./example/clients/build/Dockerfile
    env_file:
      - ./env.dev
    volumes:
      - ../../example/clients/:/app/example/clients/
      - ../../saflib/:/app/saflib/
      - ../../example/service/sdk/:/app/example/service/sdk/
    command: npm run dev

  monolith:
    image: your-org-example-monolith:latest
    volumes:
      - ../../example/service/db/data:/app/example/service/db/data
      - ../../example/service/cron/data:/app/example/service/cron/data

    build:
      context: ../..
      dockerfile: example/service/monolith/Dockerfile

    env_file:
      - ./env.dev
      - ./.env

  kratos-migrate:
    image: oryd/kratos:v26.2.0
    command: migrate sql -e --yes
    environment:
      - DSN=sqlite:///var/lib/sqlite/db.sqlite?_fk=true&mode=rwc
    volumes:
      # Persists SQLite (identities, sessions, flows) across container restarts
      - ./kratos/data:/var/lib/sqlite
      - ./kratos:/etc/config/kratos

  kratos:
    image: oryd/kratos:v26.2.0
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    environment:
      - DSN=sqlite:///var/lib/sqlite/db.sqlite?_fk=true&mode=rwc
    env_file:
      - ./env.kratos.config
    volumes:
      - ./kratos/data:/var/lib/sqlite
      - ./kratos:/etc/config/kratos

volumes:
  caddy_data:
  caddy_config:
